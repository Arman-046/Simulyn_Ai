name: Deploy to AMD Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to AMD GPU Instance via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AMD_CLOUD_HOST }}
          username: ${{ secrets.AMD_CLOUD_USER }}
          key: ${{ secrets.AMD_CLOUD_SSH_KEY }}
          script: |
            # Navigate to the project directory (or clone it if it doesn't exist)
            if [ ! -d "Simulyn_Ai" ]; then
              git clone https://github.com/${{ github.repository }}.git
              cd Simulyn_Ai
            else
              cd Simulyn_Ai
              git pull origin main
            fi

            # Create a .env file on the server with the Fireworks API key
            echo "FIREWORKS_API_KEY=${{ secrets.FIREWORKS_API_KEY }}" > .env

            # Build the new Docker image (This uses the ROCm base image we set up!)
            docker build -t simulyn-backend .

            # Stop and remove the old container if it exists
            docker stop simulyn-api || true
            docker rm simulyn-api || true

            # Run the new container, exposing port 8000
            # Note: We mount the ROCm drivers into the container using --device options
            docker run -d \
              --name simulyn-api \
              --restart unless-stopped \
              --device=/dev/kfd \
              --device=/dev/dri \
              -p 8000:8000 \
              --env-file .env \
              simulyn-backend
